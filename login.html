<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Logistics</title>
<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

  <div class="form-box active" id="loginBox">
    <form>
      <h1>Logistics Login</h1>

      <div class="input-box">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>

      <a href="404.html" class="forgot">Forgot Password?</a>

      <button type="button" class="btn" onclick="loginAccount()">Login</button>

      <p>Don't have an account?</p>
      <button type="button" class="switch-btn" onclick="showSignup()">Create Account</button>
    </form>
  </div>

  <div class="form-box" id="signupBox">
    <form>
      <h1>Create Account</h1>

      <div class="input-box">
        <i class="fas fa-user"></i>
        <input type="text" id="signupName" placeholder="Full Name" required>
      </div>

      <div class="input-box">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signupEmail" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <i class="fas fa-phone"></i>
        <input type="text" id="signupPhone" placeholder="Phone Number" required>
      </div>

      <div class="input-box">
        <i class="fas fa-lock"></i>
        <input type="password" id="signupPassword" placeholder="Password" required>
      </div>

      <button type="button" class="btn" onclick="createAccount()">Signup</button>

      <p>Already have an account?</p>
      <button type="button" class="switch-btn" onclick="showLogin()">Login Here</button>
    </form>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
